<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renomeador de CT-e</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Bibliotecas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <header>
        <h1>📄 Renomeador de CT-e</h1>
        <p>PETY / Via Appia</p>
    </header>

    <main>
        <section class="painel">
            <div class="drop-area" id="dropArea">
                <h2>Arraste os PDFs aqui</h2>
                <p>ou</p>

                <input type="file" id="fileInput" multiple accept=".pdf" hidden>
                <button id="btnSelecionar">Selecionar PDFs</button>
            </div>

            <div class="acoes">
                <button id="btnProcessar">Processar PDFs</button>
                <button id="btnExcel">Exportar Excel</button>
                <button id="btnZip">Baixar ZIP Renomeado</button>
                <button id="btnLimpar">Limpar</button>
            </div>
        </section>

        <section class="estatisticas">
            <div class="card">
                <span id="totalArquivos">0</span>
                <label>Arquivos</label>
            </div>

            <div class="card">
                <span id="totalMotoristas">0</span>
                <label>Motoristas</label>
            </div>

            <div class="card">
                <span id="totalDestinos">0</span>
                <label>Destinos</label>
            </div>
        </section>

        <section class="busca">
            <input type="text" id="pesquisa" placeholder="Pesquisar motorista, ID, destino...">
        </section>

        <section class="progresso">
            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
            <span id="status">Aguardando arquivos...</span>
        </section>

        <section class="tabela">
            <table id="resultadoTable">
                <thead>
                    <tr>
                        <th>Arquivo</th>
                        <th>CTE</th>
                        <th>ID</th>
                        <th>Motorista</th>
                        <th>Origem</th>
                        <th>Destino</th>
                        <th>Valor</th>
                        <th>Placa</th>
                        <th>Novo Nome</th>
                    </tr>
                </thead>
                <tbody id="resultado"></tbody>
            </table>
        </section>
    </main>

    <footer>
        <small>Renomeador de CT-e - GitHub Pages</small>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
